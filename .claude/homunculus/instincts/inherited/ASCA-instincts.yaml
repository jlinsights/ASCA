# ASCA Workflow Pdca Feature Delivery Cycle

## Action

Follow the pdca-feature-delivery-cycle workflow:
1. Write a detailed plan document outlining issues and implementation stages (docs/01-plan/...)
2. Write a design document with before/after code, scenarios, and implementation order (docs/02-design/...)
3. Commit code changes in discrete steps, each targeting specific files/issues (e.g., S1-S7, C1, H1, etc.)
4. Update .bkit-memory.json to track progress and phases
5. Analyze implementation vs. plan/design and write an analysis document (docs/03-analysis/...)
6. Write a final report summarizing the cycle and outcomes (docs/04-report/...)

## Evidence

- Workflow detected from commit patterns
- Frequency: ~1x per month
- Files: docs/01-plan/features/*.plan.md, docs/02-design/features/*.design.md, docs/03-analysis/*.analysis.md

