# ASCA Workflow Security Fix Implementation

## Action

Follow the security-fix-implementation workflow:
1. Identify the target file and security issue (e.g., C1, C2, H1-H4)
2. Implement the fix in the relevant file (e.g., enforce auth, restrict access, sanitize errors)
3. Optionally update related files for consistency or formatting
4. Verify with tsc or similar checks

## Evidence

- Workflow detected from commit patterns
- Frequency: ~4x per month
- Files: lib/graphql/context.ts, app/api/realtime/sse/route.ts, app/api/members/[id]/route.ts

