name: E2E Tests (Playwright)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test-e2e:
    name: Run E2E Tests
    timeout-minutes: 60
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium]
        # Add more browsers if needed: [chromium, firefox, webkit]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Setup environment variables
        run: |
          # Next.js with NODE_ENV=test loads .env.test (NOT .env.local).
          # See: https://nextjs.org/docs/app/building-your-application/configuring/environment-variables
          cp .env.example .env.test
          cp .env.example .env.local  # safety net for any non-Next consumer
          # Add any additional environment variables needed for testing

      - name: Run Playwright tests
        run: npm run test:e2e:ci
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          NODE_ENV: test

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 30

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results-${{ matrix.browser }}
          path: playwright-report/results.json
          retention-days: 30
